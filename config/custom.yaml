zotero:
  user_id: ${oc.env:ZOTERO_ID}
  api_key: ${oc.env:ZOTERO_KEY}
  include_path: null # Or set a list of glob patterns, e.g. ["2026/survey/**","2026/reading-group/**"]

email:
  # Deprecated in PaperFlow Agent: daily results are written to Zotero instead of sent by email.
  sender: ${oc.env:SENDER,null}
  receiver: ${oc.env:RECEIVER,null}
  smtp_server: smtp.qq.com
  smtp_port: 465
  sender_password: ${oc.env:SENDER_PASSWORD,null}

zotero_writer:
  collection_path: 00_Inbox/00_to_Read_list
  dry_run: false
  skip_existing: true
  tags:
    status: status/to_read

llm:
  api:
    key: ${oc.env:DEEPSEEK_API_KEY}
    base_url: ${oc.env:DEEPSEEK_API_BASE}
  generation_kwargs:
    model: deepseek-chat

source:
  arxiv:
    category: ["cs.AI","cs.CV","cs.LG","cs.CL","eess.IV","physics.geo-ph"]
    include_cross_list: false

executor:
  debug: ${oc.env:DEBUG,null}
  source: ['arxiv']
